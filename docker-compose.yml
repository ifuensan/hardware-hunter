# salvager — single-service docker-compose deployment.
# Operator workflow (after `salvager init` scaffolds config files):
#   docker-compose up -d
# See architecture.md AR17 + FR50 (stop_grace_period matches SIGTERM drain).

services:
  salvager:
    image: ghcr.io/ifuensan/salvager:latest
    container_name: salvager
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      - ./data:/app/data
      - ./config:/app/config
